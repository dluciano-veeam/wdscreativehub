<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WDS LABS - Creative Hub</title>
  <link rel="icon" href="https://www.veeam.com/favicon.ico">
  <link rel="preload" href="./assets/fonts/esbuild/ESBuildNeutral-Regular.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="./assets/fonts/esbuild/ESBuildNeutral-Medium.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="./assets/fonts/esbuild/ESBuildNeutral-SemiBold.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="./assets/fonts/esbuild/ESBuildNeutral-Bold.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app">
    <header class="hero">
      <div>
        <div class="brand">
          <img class="brand-logo" src="./assets/veeam-logo.svg" alt="Veeam logo" />
          <p class="eyebrow">WDS LABS</p>
        </div>
        <h1 id="detailTitle">POC Detail</h1>
        <p id="detailDescription" class="subtitle"></p>
      </div>
      <div class="hero-actions">
        <a class="button ghost" href="./">Back to gallery</a>
      </div>
    </header>

    <section class="filters">
      <div class="filter-label">Tags</div>
      <div id="detailTags" class="tag-row"></div>
    </section>

    <main>
      <div class="preview-block detail-preview">
        <iframe id="detailFrame" title="Demo" sandbox="allow-scripts allow-same-origin"></iframe>
      </div>
    </main>
  </div>

  <script src="./poc.js"></script>
</body>
</html>
