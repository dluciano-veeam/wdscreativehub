<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WDS LABS - Media Inventory Dashboard</title>
  <link rel="icon" href="https://www.veeam.com/favicon.ico">
  <link rel="preload" href="./assets/fonts/esbuild/ESBuildNeutral-Regular.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="./assets/fonts/esbuild/ESBuildNeutral-Medium.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="./assets/fonts/esbuild/ESBuildNeutral-SemiBold.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="./assets/fonts/esbuild/ESBuildNeutral-Bold.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app">
    <div class="shell">
      <aside class="sidebar">
        <a class="side-brand" href="./" aria-label="WDS Labs home">
          <img class="side-brand-logo" src="./assets/veeam-logo.svg" alt="Veeam logo" />
          <span>WDS LABS</span>
        </a>
        <nav class="side-nav">
          <a class="side-link" href="./competitive.html">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 19h18v2H3v-2zm2-3h3V8H5v8zm5 0h3V4h-3v12zm5 0h3v-6h-3v6z"/></svg>
            <span>Competitive Analysis</span>
          </a>
          <a class="side-link active" href="./media-inventory.html">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5h16v14H4V5zm2 2v10h12V7H6zm2 2h5v5H8V9zm6 0h2v2h-2V9zm0 3h2v2h-2v-2z"/></svg>
            <span>Media Inventory</span>
          </a>
          <a class="side-link" href="./">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M11 3l1.8 4.5L17 9.3l-4.2 1.8L11 15.6 9.2 11.1 5 9.3l4.2-1.8L11 3zm7 9l1 2.4 2.4 1-2.4 1-1 2.4-1-2.4-2.4-1 2.4-1 1-2.4zM6 13l.8 1.9 1.9.8-1.9.8L6 18.4l-.8-1.9-1.9-.8 1.9-.8L6 13z"/></svg>
            <span>Creative Hub</span>
          </a>
          <a class="side-link" href="#">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 4h14v2H5V4zm0 4h14v2H5V8zm0 4h10v2H5v-2zm0 4h8v2H5v-2z"/></svg>
            <span>Character Count</span>
          </a>
          <a class="side-link" href="#">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 12a4 4 0 100-8 4 4 0 000 8zm0 2c-4.418 0-8 2.239-8 5v1h16v-1c0-2.761-3.582-5-8-5z"/></svg>
            <span>Who we are?</span>
          </a>
        </nav>
      </aside>

      <div class="main-content">
        <div class="top-search top-search--detail">
          <button id="mobileMenuToggle" class="mobile-menu-toggle" type="button" aria-label="Toggle menu" aria-expanded="false">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18v2H3V6zm0 5h18v2H3v-2zm0 5h18v2H3v-2z"/></svg>
          </button>
        </div>
        <nav class="breadcrumb" aria-label="Breadcrumb">
          <a href="./media-inventory.html">Media Inventory</a>
          <span>/</span>
          <span id="inventoryCrumb">Client dashboard</span>
        </nav>

        <header class="hero">
          <div>
            <h1 id="inventoryClientTitle" class="hero-title">Media Inventory</h1>
            <p id="inventoryClientSubtitle" class="subtitle"></p>
          </div>
          <div class="hero-actions">
            <button id="runScanBtn" class="button add-poc" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6a6 6 0 0 1-6 6 6 6 0 0 1-5.65-4H4.26A8 8 0 0 0 12 20a8 8 0 0 0 0-16z"/></svg>
              <span>Run scan</span>
            </button>
            <a id="inventorySiteLink" class="button" target="_blank" rel="noreferrer noopener">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M14 3h7v7h-2V6.41l-9.29 9.3-1.42-1.42 9.3-9.29H14V3zM5 5h6v2H7v10h10v-4h2v6H5V5z"/></svg>
              <span>Visit site</span>
            </a>
            <a class="button ghost" href="./media-inventory.html">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 4h8v8H3V4zm10 0h8v8h-8V4zM3 14h8v8H3v-8zm10 0h8v8h-8v-8z"/></svg>
              <span>Back to list</span>
            </a>
          </div>
        </header>

        <p id="inventoryStatus" class="competitive-baseline-note hidden"></p>

        <section class="competitive-kpis media-kpis" id="mediaKpiRow"></section>

        <main class="media-dashboard">
          <section class="preview-block media-page-table-wrap">
            <div class="preview-header media-table-head">
              <h3>Media inventory by page</h3>
              <div class="media-table-tools">
                <label for="pageFilterInput" class="filter-label">Filter pages</label>
                <input id="pageFilterInput" class="input media-filter-input" type="search" placeholder="ex: /contact" />
                <label for="typeFilterSelect" class="filter-label">Asset type</label>
                <select id="typeFilterSelect" class="input media-filter-select">
                  <option value="all">All types</option>
                </select>
              </div>
            </div>
            <div class="media-table-scroll">
              <table class="media-table">
                <thead>
                  <tr>
                    <th>Page</th>
                    <th>Total</th>
                    <th>Hidden</th>
                    <th>PNG</th>
                    <th>JPG</th>
                    <th>JPEG</th>
                    <th>SVG</th>
                    <th>Video</th>
                    <th>Assets</th>
                  </tr>
                </thead>
                <tbody id="mediaTableBody"></tbody>
              </table>
            </div>
          </section>
        </main>
      </div>
    </div>
  </div>
  <button id="sidebarOverlay" class="sidebar-overlay" type="button" aria-label="Close menu"></button>

  <script src="./sidebar.js"></script>
  <script src="./media-inventory-client.js"></script>
</body>
</html>
