<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Animated Mask Reveal</title>
  <style>
    :root {
      --wdslabs-viridis: #00d15f;
      --wdslabs-bg: #050913;
      --wdslabs-panel: #0c1424;
      --wdslabs-border: rgba(255, 255, 255, 0.14);
      --wdslabs-canvas-w: 1920;
      --wdslabs-canvas-h: 1539;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      width: 100vw;
      height: 100vh;
      background: transparent;
      font-family: "ES Build", "Segoe UI", Arial, sans-serif;
      color: #ffffff;
      overflow: hidden;
    }

    .wdslabs-stage {
      width: 100vw;
      height: 100vh;
      position: relative;
      overflow: hidden;
      background: var(--wdslabs-panel);
    }

    .wdslabs-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      user-select: none;
      pointer-events: none;
      -webkit-user-drag: none;
    }

    .wdslabs-layer--top {
      z-index: 3;
      filter: saturate(1.02) contrast(1.03);
    }

    .wdslabs-fade-overlay {
      position: absolute;
      inset: 0;
      z-index: 8;
      pointer-events: none;
    }

    .wdslabs-fade-side {
      position: absolute;
      top: 0;
      bottom: 0;
      width: min(50%, 960px);
    }

    .wdslabs-fade-side--left {
      left: 0;
      background: linear-gradient(90deg, rgba(0, 32, 96, 1) 0%, rgba(14, 78, 106, 0) 40%);
    }

    .wdslabs-fade-side--right {
      right: 0;
      background: linear-gradient(270deg, rgba(0, 32, 96, 1) 0%, rgba(0, 32, 96, 0) 40%);
    }

    .wdslabs-fade-bottom {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: min(65.11%, 1002px);
      background: linear-gradient(180deg, rgba(18, 103, 181, 0) 0%, rgba(9, 69, 151, 0.81) 39%, rgba(0, 32, 96, 1) 80%);
    }

    .wdslabs-mask-window {
      position: absolute;
      z-index: 6;
      left: 0;
      top: 0;
      width: 180px;
      height: 180px;
      border-radius: 0;
      pointer-events: none;
      will-change: transform;
      overflow: hidden;
    }

    .wdslabs-mask-image {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      user-select: none;
      pointer-events: none;
      -webkit-user-drag: none;
    }

    @media (max-width: 1200px) {
      :root {
        --wdslabs-canvas-w: 1024;
        --wdslabs-canvas-h: 1563;
      }

      .wdslabs-fade-side { display: none; }
      .wdslabs-fade-bottom { background: linear-gradient(180deg, rgba(18, 103, 181, 0) 20%, rgba(31, 113, 149, 0.8) 46%, rgba(0, 32, 96, 1) 100%); }
    }

    @media (max-width: 820px) {
      :root {
        --wdslabs-canvas-w: 768;
        --wdslabs-canvas-h: 1543;
      }

      .wdslabs-fade-side { display: none; }
      .wdslabs-fade-bottom { background: linear-gradient(180deg, rgba(18, 103, 181, 0) 39%, rgba(0, 32, 96, 1) 100%); }
    }

    @media (max-width: 430px) {
      :root {
        --wdslabs-canvas-w: 375;
        --wdslabs-canvas-h: 1271;
      }

      .wdslabs-fade-side { display: none; }
      .wdslabs-fade-bottom { background: linear-gradient(180deg, rgba(18, 103, 181, 0) 39%, rgba(0, 30, 91, 1) 100%); }
    }

  </style>
</head>
<body>
  <div class="wdslabs-stage" id="wdslabs-stage" aria-label="Animated mask reveal demo">
    <img class="wdslabs-layer wdslabs-layer--top" src="./bottom.jpg" alt="Base visual layer" />
    <div class="wdslabs-fade-overlay" aria-hidden="true">
      <div class="wdslabs-fade-side wdslabs-fade-side--left"></div>
      <div class="wdslabs-fade-side wdslabs-fade-side--right"></div>
      <div class="wdslabs-fade-bottom"></div>
    </div>
    <div class="wdslabs-mask-window" id="wdslabs-window" aria-hidden="true">
      <img class="wdslabs-mask-image" id="wdslabs-mask-image" src="./top.jpg" alt="" />
    </div>
  </div>

  <script>
    const wdslabsStage = document.getElementById('wdslabs-stage');
    const wdslabsWindow = document.getElementById('wdslabs-window');
    const wdslabsMaskImage = document.getElementById('wdslabs-mask-image');

    let wdslabsStart = performance.now();
    const wdslabsLayout = {
      w: 0,
      h: 0,
      maskW: 0,
      maskH: 0,
      rangeY: 0,
      anchorX: 0,
      centerY: 0,
      anchorMode: "left-center"
    };

    function wdslabsGetSpec() {
      const vw = window.innerWidth;
      if (vw <= 430) {
        return { canvasW: 375, canvasH: 1271, maskW: 78, maskH: 852, anchorMode: "right-edge" };
      }
      if (vw <= 820) {
        return { canvasW: 768, canvasH: 1543, maskW: 188, maskH: 973, anchorMode: "left-center" };
      }
      if (vw <= 1200) {
        return { canvasW: 1024, canvasH: 1563, maskW: 233, maskH: 775, anchorMode: "right-edge" };
      }
      return { canvasW: 1920, canvasH: 1539, maskW: 282, maskH: 962, anchorMode: "left-center" };
    }

    function wdslabsRecomputeLayout() {
      const rect = wdslabsStage.getBoundingClientRect();
      const w = rect.width;
      const h = rect.height;
      const spec = wdslabsGetSpec();
      const baseScale = Math.min(w / spec.canvasW, h / spec.canvasH);
      const isDesktopSpec = spec.canvasW === 1920;
      const scale = isDesktopSpec ? Math.min(1, baseScale) : baseScale;
      const maskW = spec.maskW * scale;
      const maskH = spec.maskH * scale;

      wdslabsLayout.w = w;
      wdslabsLayout.h = h;
      wdslabsLayout.maskW = maskW;
      wdslabsLayout.maskH = maskH;
      wdslabsLayout.rangeY = h * 0.035;
      wdslabsLayout.anchorMode = spec.anchorMode;
      wdslabsLayout.anchorX = spec.anchorMode === "right-edge" ? (w - maskW) : (w * 0.5);
      wdslabsLayout.centerY = h * 0.54;

      wdslabsWindow.style.width = `${maskW}px`;
      wdslabsWindow.style.height = `${maskH}px`;
      wdslabsMaskImage.style.width = `${w}px`;
      wdslabsMaskImage.style.height = `${h}px`;
    }

    function wdslabsAnimate(time) {
      const t = (time - wdslabsStart) / 1000;
      const x = wdslabsLayout.anchorX;
      const y = wdslabsLayout.centerY + Math.cos(t * 0.42) * wdslabsLayout.rangeY - wdslabsLayout.maskH * 0.5;

      wdslabsWindow.style.transform = `translate3d(${x}px, ${y}px, 0)`;
      wdslabsMaskImage.style.transform = `translate3d(${-x}px, ${-y}px, 0)`;

      requestAnimationFrame(wdslabsAnimate);
    }

    window.addEventListener('resize', wdslabsRecomputeLayout);
    wdslabsRecomputeLayout();
    requestAnimationFrame(wdslabsAnimate);
  </script>
</body>
</html>
